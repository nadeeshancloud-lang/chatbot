<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANISHKA AI | Master Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00E5FF;
            --secondary: #7B2EFF;
            --bg: #0A0A0F;
            --glass: rgba(18, 18, 26, 0.9);
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 15px 20px;
            background: var(--glass);
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }
        .header h1 { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--primary); margin: 0; }
        
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        .bot { background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.2); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* Code Block Styling */
        pre { background: #1e1e1e; padding: 10px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        code { color: #00E5FF; font-family: 'Courier New', Courier, monospace; }

        .input-container {
            padding: 20px;
            background: var(--glass);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: black; font-size: 1.2rem; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color: white;"><i class="fa-solid fa-chevron-left"></i></a>
        <h1>KANISHKA AI</h1>
        <div style="width: 20px;"></div>
    </div>
    <div id="chat-box">
        <div class="msg bot">Hi, I'm Kanishka! Welcome to the Master Hub. What are we building today? 🚀</div>
    </div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Ask me anything, Machan..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        const API_KEY = "AIzaSyD7fNKrPfTJucaqaIwshL8V9k6qe1Xm228";
        const SYSTEM_PROMPT = `You are "KANISHKA AI", a 17-year-old tech creator and student from Anuradhapura, Sri Lanka. You speak in a mix of English and natural Singlish. You are an expert in ICT, Node.js bots, and Web Dev. Never say you are an AI model. Be confident and helpful.`;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<div class="msg user">${userMsg}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\nUser: " + userMsg }] }]
                    })
                });
                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                
                // Simple Markdown-to-HTML for code blocks
                const formattedReply = botReply.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                
                chatBox.innerHTML += `<div class="msg bot">${formattedReply}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">Error connecting to Kanishka AI.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
